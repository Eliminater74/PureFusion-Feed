name: Release

# Trigger: push a vX.Y.Z tag  OR  run manually from the Actions tab.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.2.0) — must match the version in manifest.json'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

jobs:
  build-and-release:
    name: Build zip & publish release
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create GitHub Releases and upload assets

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Resolve tag name (works for both trigger types) ─────────────────
      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          # Strip leading 'v' to get bare version number
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 3. Verify manifest version matches the tag ─────────────────────────
      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VER=$(python3 - <<'EOF'
          import json, sys
          with open("purefusion-feed/manifest.json") as f:
              print(json.load(f)["version"])
          EOF
          )
          TAG_VER="${{ steps.tag.outputs.version }}"
          echo "Manifest version : $MANIFEST_VER"
          echo "Tag version      : $TAG_VER"
          if [[ "$MANIFEST_VER" != "$TAG_VER" ]]; then
            echo "::error::manifest.json version ($MANIFEST_VER) does not match tag ($TAG_VER)."
            echo "Run: python scripts/bump_version.py --set $TAG_VER"
            exit 1
          fi

      # ── 4. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 5. Build the release zip via build_release.py ─────────────────────
      - name: Build release zip
        run: |
          mkdir -p /tmp/release
          python scripts/build_release.py --output /tmp/release
        # build_release.py exits non-zero if version badges are inconsistent

      # ── 6. Locate the produced zip ─────────────────────────────────────────
      - name: Locate zip artifact
        id: zip
        run: |
          ZIP=$(ls /tmp/release/purefusion-feed-v*.zip | head -1)
          echo "path=$ZIP"         >> "$GITHUB_OUTPUT"
          echo "name=$(basename $ZIP)" >> "$GITHUB_OUTPUT"
          SHA=$(sha256sum "$ZIP" | awk '{print $1}')
          echo "sha256=$SHA"       >> "$GITHUB_OUTPUT"

      # ── 7. Extract CHANGELOG entry for release body ────────────────────────
      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          # Pull the block between "## vX.Y.Z" and the next "## v" heading
          BODY=$(python3 - <<EOF
          import re, sys
          text = open("purefusion-feed/CHANGELOG.md").read()
          pattern = r"(## v${VERSION}.*?)(?=\n## v|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else "See CHANGELOG.md for details.")
          EOF
          )
          # Write to a file to avoid quoting issues in multiline env vars
          echo "$BODY" > /tmp/release_body.md
          echo "SHA-256: \`${{ steps.zip.outputs.sha256 }}\`" >> /tmp/release_body.md

      # ── 8. Create GitHub Release and upload the zip ────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ZIP="${{ steps.zip.outputs.path }}"
          ZIP_NAME="${{ steps.zip.outputs.name }}"
          PRERELEASE="${{ inputs.prerelease || 'false' }}"

          PRERELEASE_FLAG=""
          if [[ "$PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "PureFusion Feed $TAG" \
            --notes-file /tmp/release_body.md \
            $PRERELEASE_FLAG \
            "$ZIP#$ZIP_NAME"
